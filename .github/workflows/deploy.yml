name: Deploy Virtual Receptionist

on:
  push:
    branches: [ main ]
    paths:
      - 'bot/**'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:

  # ── Job 1: Lint ──────────────────────────────────────────────
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r bot/requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 bot/ \
            --max-line-length=120 \
            --ignore=E501,W503 \
            --exclude=__pycache__,.python_packages

  # ── Job 2: Deploy ─────────────────────────────────────────────
  deploy:
    name: Deploy to Azure Function App
    runs-on: ubuntu-latest
    needs: lint-and-test
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Ensure the Function App is configured for SCM-based deployment.
      # WEBSITE_RUN_FROM_PACKAGE=0 means code is deployed to wwwroot directly
      # (not from a zip package), so Kudu's SCM build pipeline can install
      # dependencies server-side. This avoids cross-platform wheel issues that
      # arise from pre-building on ubuntu-latest and uploading binaries.
      - name: Configure deployment settings
        run: |
          az functionapp config appsettings set \
            --name "${{ secrets.FUNCTION_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --settings \
              "WEBSITE_RUN_FROM_PACKAGE=0" \
              "SCM_DO_BUILD_DURING_DEPLOYMENT=true" \
            --output none

      - name: Deploy bot to Azure Function App
        # scm-do-build-during-deployment=true tells the Kudu SCM pipeline to
        # run `pip install -r requirements.txt` server-side after the upload.
        # enable-oryx-build is intentionally omitted — it conflicts with
        # WEBSITE_RUN_FROM_PACKAGE and causes deployment failures.
        uses: Azure/functions-action@v1
        with:
          app-name:                       ${{ secrets.FUNCTION_APP_NAME }}
          package:                        './bot'
          scm-do-build-during-deployment: true

      - name: Wait for Function App cold start
        # SCM build + Python worker init on Consumption plan can take 90s+
        run: sleep 90

      - name: Retrieve function key via Kudu SCM API
        # az functionapp keys list depends on the Functions runtime being fully
        # initialised — it can fail immediately after a cold deploy. The Kudu
        # SCM API operates independently of the runtime and is reliable here.
        #
        # NOTE: --query "[a, b]" --output tsv returns a single TAB-separated
        # line, not two newline-separated lines. Query each field individually
        # to avoid the awk NR==2 returning empty string.
        run: |
          KUDU_USER=$(az functionapp deployment list-publishing-credentials \
            --name           "${{ secrets.FUNCTION_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query          "publishingUserName" \
            --output         tsv)

          KUDU_PASS=$(az functionapp deployment list-publishing-credentials \
            --name           "${{ secrets.FUNCTION_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query          "publishingPassword" \
            --output         tsv)

          echo "Kudu user: $KUDU_USER"

          MAX_ATTEMPTS=10
          ATTEMPT=1
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Key fetch attempt $ATTEMPT of $MAX_ATTEMPTS..."

            KUDU_RESPONSE=$(curl -s \
              -u "${KUDU_USER}:${KUDU_PASS}" \
              "https://${{ secrets.FUNCTION_APP_NAME }}.scm.azurewebsites.net/api/functions/admin/masterkey")

            echo "Kudu response: $KUDU_RESPONSE"

            FUNCTION_KEY=$(echo "$KUDU_RESPONSE" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(d.get('masterKey',''))" 2>/dev/null)

            if [ -n "$FUNCTION_KEY" ] && [ "$FUNCTION_KEY" != "null" ]; then
              echo "Function key retrieved."
              echo "FUNCTION_KEY=$FUNCTION_KEY" >> "$GITHUB_ENV"
              break
            fi

            echo "  Not ready yet — waiting 20s..."
            sleep 20
            ATTEMPT=$((ATTEMPT + 1))
          done

          if [ -z "$FUNCTION_KEY" ]; then
            echo "Failed to retrieve function key after $MAX_ATTEMPTS attempts"
            exit 1
          fi

      - name: Health check
        run: |
          HEALTH_URL="https://${{ secrets.FUNCTION_APP_NAME }}.azurewebsites.net/api/health?code=${FUNCTION_KEY}"
          echo "Checking: $HEALTH_URL"

          MAX_ATTEMPTS=8
          ATTEMPT=1
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Health check attempt $ATTEMPT of $MAX_ATTEMPTS..."

            HTTP_STATUS=$(curl -s -o /tmp/health_body -w "%{http_code}" --max-time 30 "$HEALTH_URL")
            BODY=$(cat /tmp/health_body)
            echo "HTTP $HTTP_STATUS — $BODY"

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi

            # On 404: runtime is up but route not found.
            # Dump the wwwroot file listing to diagnose packaging issues.
            if [ "$HTTP_STATUS" = "404" ]; then
              echo "--- 404: dumping wwwroot file listing ---"
              DIAG_USER=$(az functionapp deployment list-publishing-credentials \
                --name            "${{ secrets.FUNCTION_APP_NAME }}" \
                --resource-group  "${{ secrets.AZURE_RESOURCE_GROUP }}" \
                --query           "publishingUserName" \
                --output          tsv)
              DIAG_PASS=$(az functionapp deployment list-publishing-credentials \
                --name            "${{ secrets.FUNCTION_APP_NAME }}" \
                --resource-group  "${{ secrets.AZURE_RESOURCE_GROUP }}" \
                --query           "publishingPassword" \
                --output          tsv)
              curl -s -u "${DIAG_USER}:${DIAG_PASS}" \
                "https://${{ secrets.FUNCTION_APP_NAME }}.scm.azurewebsites.net/api/vfs/site/wwwroot/" \
                | python3 -c "
          import sys, json
          try:
              items = json.load(sys.stdin)
              print('wwwroot contents:')
              for f in items:
                  print(' ', f.get('name','?'))
          except Exception as e:
              print('Could not parse listing:', e)
          "
              echo "--- end listing ---"
            fi

            if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
              echo "Waiting 20s before retry..."
              sleep 20
            fi
            ATTEMPT=$((ATTEMPT + 1))
          done

          echo "Health check failed after $MAX_ATTEMPTS attempts"
          exit 1

      - name: Notify Teams — success
        if: success()
        run: |
          curl -s -o /dev/null -X POST "${{ secrets.TEAMS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "status":  "success",
              "app":     "${{ secrets.FUNCTION_APP_NAME }}",
              "branch":  "${{ github.ref_name }}",
              "commit":  "${{ github.sha }}",
              "actor":   "${{ github.actor }}",
              "message": "Virtual Receptionist deployed successfully"
            }' || true

      - name: Notify Teams — failure
        if: failure()
        run: |
          curl -s -o /dev/null -X POST "${{ secrets.TEAMS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "status":  "failure",
              "app":     "${{ secrets.FUNCTION_APP_NAME }}",
              "branch":  "${{ github.ref_name }}",
              "commit":  "${{ github.sha }}",
              "actor":   "${{ github.actor }}",
              "message": "Virtual Receptionist deployment FAILED - check GitHub Actions logs"
            }' || true
