name: Deploy Virtual Receptionist

on:
  push:
    branches: [ main ]
    paths:
      - 'bot/**'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:

  # ── Job 1: Lint ──────────────────────────────────────────────
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r bot/requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 bot/ \
            --max-line-length=120 \
            --ignore=E501,W503 \
            --exclude=__pycache__,.python_packages

  # ── Job 2: Deploy ─────────────────────────────────────────────
  deploy:
    name: Deploy to Azure Function App
    runs-on: ubuntu-latest
    needs: lint-and-test
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure app settings for remote build
        run: |
          az functionapp config appsettings set \
            --name "${{ secrets.FUNCTION_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --settings \
              "WEBSITE_RUN_FROM_PACKAGE=1" \
              "SCM_DO_BUILD_DURING_DEPLOYMENT=true" \
              "ENABLE_ORYX_BUILD=true" \
              "BUILD_FLAGS=UseExpressBuild" \
              "XDG_CACHE_HOME=/tmp/.cache" \
            --output none

      - name: Deploy bot to Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name:                       ${{ secrets.FUNCTION_APP_NAME }}
          package:                        './bot'
          scm-do-build-during-deployment: true
          enable-oryx-build:              true

      - name: Wait for Function App cold start
        run: sleep 90

      - name: Health check (with retry)
        run: |
          FUNCTION_KEY=$(az functionapp keys list \
            --name            "${{ secrets.FUNCTION_APP_NAME }}" \
            --resource-group  "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query           "functionKeys.default" \
            --output          tsv)

          HEALTH_URL="https://${{ secrets.FUNCTION_APP_NAME }}.azurewebsites.net/api/health?code=${FUNCTION_KEY}"
          echo "Checking: $HEALTH_URL"

          MAX_ATTEMPTS=8
          ATTEMPT=1
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Health check attempt $ATTEMPT of $MAX_ATTEMPTS..."
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$HEALTH_URL")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Health check passed (HTTP 200)"
              exit 0
            fi
            echo "Health check returned HTTP $HTTP_STATUS"
            if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
              echo "Waiting 20s before retry..."
              sleep 20
            fi
            ATTEMPT=$((ATTEMPT + 1))
          done

          echo "Health check failed after $MAX_ATTEMPTS attempts"
          exit 1

      - name: Notify Teams — success
        if: success()
        run: |
          curl -s -o /dev/null -X POST "${{ secrets.TEAMS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "status":  "success",
              "app":     "${{ secrets.FUNCTION_APP_NAME }}",
              "branch":  "${{ github.ref_name }}",
              "commit":  "${{ github.sha }}",
              "actor":   "${{ github.actor }}",
              "message": "Virtual Receptionist deployed successfully"
            }' || true

      - name: Notify Teams — failure
        if: failure()
        run: |
          curl -s -o /dev/null -X POST "${{ secrets.TEAMS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "status":  "failure",
              "app":     "${{ secrets.FUNCTION_APP_NAME }}",
              "branch":  "${{ github.ref_name }}",
              "commit":  "${{ github.sha }}",
              "actor":   "${{ github.actor }}",
              "message": "Virtual Receptionist deployment FAILED - check GitHub Actions logs"
            }' || true
