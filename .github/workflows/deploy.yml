name: Deploy Virtual Receptionist

on:
  push:
    branches: [ main ]
    paths:
      - 'bot/**'         # Only trigger when bot code changes
  workflow_dispatch:     # Allow manual trigger from GitHub Actions UI

env:
  PYTHON_VERSION: '3.11'

jobs:

  # ── Job 1: Lint ──────────────────────────────────────────────
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r bot/requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 bot/ \
            --max-line-length=120 \
            --ignore=E501,W503 \
            --exclude=__pycache__,.python_packages

  # ── Job 2: Deploy ─────────────────────────────────────────────
  deploy:
    name: Deploy to Azure Function App
    runs-on: ubuntu-latest
    needs: lint-and-test
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Azure Functions Core Tools
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Resolve bot dependencies into package folder
        run: |
          pushd bot
          pip install -r requirements.txt \
            --target=".python_packages/lib/site-packages"
          popd

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy bot to Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name:                    ${{ secrets.FUNCTION_APP_NAME }}
          package:                     './bot'
          scm-do-build-during-deployment: true
          enable-oryx-build:           true

      - name: Wait for Function App cold start
        run: sleep 30

      - name: Health check
        run: |
          FUNCTION_KEY=$(az functionapp keys list \
            --name            "${{ secrets.FUNCTION_APP_NAME }}" \
            --resource-group  "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query           "functionKeys.default" \
            --output          tsv)

          HEALTH_URL="https://${{ secrets.FUNCTION_APP_NAME }}.azurewebsites.net/api/health?code=${FUNCTION_KEY}"
          echo "Checking: $HEALTH_URL"

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL")

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Health check passed (HTTP 200)"
          else
            echo "Health check failed (HTTP $HTTP_STATUS)"
            exit 1
          fi

      # Teams notification via Power Automate HTTP trigger
      # (Office 365 Connectors are deprecated — use a Power Automate flow instead)
      # Set up: Power Automate > Create > Instant cloud flow > When an HTTP request is received
      # Paste the flow URL into the TEAMS_WEBHOOK_URL secret
      - name: Notify Teams — success
        if: success()
        run: |
          curl -s -o /dev/null -X POST "${{ secrets.TEAMS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "status":      "success",
              "app":         "${{ secrets.FUNCTION_APP_NAME }}",
              "branch":      "${{ github.ref_name }}",
              "commit":      "${{ github.sha }}",
              "actor":       "${{ github.actor }}",
              "message":     "Virtual Receptionist deployed successfully"
            }' || true

      - name: Notify Teams — failure
        if: failure()
        run: |
          curl -s -o /dev/null -X POST "${{ secrets.TEAMS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "status":      "failure",
              "app":         "${{ secrets.FUNCTION_APP_NAME }}",
              "branch":      "${{ github.ref_name }}",
              "commit":      "${{ github.sha }}",
              "actor":       "${{ github.actor }}",
              "message":     "Virtual Receptionist deployment FAILED - check GitHub Actions logs"
            }' || true
