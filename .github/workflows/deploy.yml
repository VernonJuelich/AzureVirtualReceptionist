name: Deploy Virtual Receptionist

on:
  push:
    branches: [ main ]
    paths:
      - 'bot/**'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:

  # ── Job 1: Lint ──────────────────────────────────────────────
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r bot/requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 bot/ \
            --max-line-length=120 \
            --ignore=E501,W503 \
            --exclude=__pycache__,.python_packages

  # ── Job 2: Deploy ─────────────────────────────────────────────
  deploy:
    name: Deploy to Azure Function App
    runs-on: ubuntu-latest
    needs: lint-and-test
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies into package folder
        run: |
          pushd bot
          pip install -r requirements.txt \
            --target=".python_packages/lib/site-packages"
          echo "Package count: $(ls .python_packages/lib/site-packages | wc -l)"
          popd

      - name: Create deployment zip
        run: |
          cd bot
          zip -r ../deployment.zip . \
            --exclude "*.pyc" \
            --exclude "__pycache__/*"
          cd ..
          echo "Zip size: $(du -sh deployment.zip)"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get publishing credentials
        id: pubcreds
        run: |
          CREDS=$(az functionapp deployment list-publishing-credentials \
            --name "${{ secrets.FUNCTION_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query "{user:publishingUserName,pass:publishingPassword}" \
            --output json)
          echo "user=$(echo $CREDS | jq -r .user)" >> $GITHUB_OUTPUT
          echo "pass=$(echo $CREDS | jq -r .pass)" >> $GITHUB_OUTPUT

      - name: Set WEBSITE_RUN_FROM_PACKAGE=0
        run: |
          az functionapp config appsettings set \
            --name "${{ secrets.FUNCTION_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --settings "WEBSITE_RUN_FROM_PACKAGE=0" \
            --output none

      - name: Deploy via Kudu zip API
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/deploy_response.txt -w "%{http_code}" \
            -X POST \
            -u "${{ steps.pubcreds.outputs.user }}:${{ steps.pubcreds.outputs.pass }}" \
            -H "Content-Type: application/zip" \
            --data-binary @deployment.zip \
            "https://${{ secrets.FUNCTION_APP_NAME }}.scm.azurewebsites.net/api/zipdeploy?isAsync=false")
          cat /tmp/deploy_response.txt
          echo "HTTP Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "202" ]; then
            echo "Deployment failed with status $HTTP_STATUS"
            exit 1
          fi
          echo "Deployment succeeded"

      - name: Restart Function App
        run: |
          az functionapp restart \
            --name "${{ secrets.FUNCTION_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}"

      - name: Wait for Function App restart
        run: sleep 45

      - name: Health check (with retry)
        run: |
          FUNCTION_KEY=$(az functionapp keys list \
            --name            "${{ secrets.FUNCTION_APP_NAME }}" \
            --resource-group  "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query           "functionKeys.default" \
            --output          tsv)

          HEALTH_URL="https://${{ secrets.FUNCTION_APP_NAME }}.azurewebsites.net/api/health?code=${FUNCTION_KEY}"
          echo "Checking: $HEALTH_URL"

          MAX_ATTEMPTS=5
          ATTEMPT=1
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Health check attempt $ATTEMPT of $MAX_ATTEMPTS..."
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "$HEALTH_URL")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Health check passed (HTTP 200)"
              exit 0
            fi
            echo "Health check returned HTTP $HTTP_STATUS"
            if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
              echo "Waiting 15s before retry..."
              sleep 15
            fi
            ATTEMPT=$((ATTEMPT + 1))
          done

          echo "Health check failed after $MAX_ATTEMPTS attempts"
          exit 1

      - name: Notify Teams — success
        if: success()
        run: |
          curl -s -o /dev/null -X POST "${{ secrets.TEAMS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "status":  "success",
              "app":     "${{ secrets.FUNCTION_APP_NAME }}",
              "branch":  "${{ github.ref_name }}",
              "commit":  "${{ github.sha }}",
              "actor":   "${{ github.actor }}",
              "message": "Virtual Receptionist deployed successfully"
            }' || true

      - name: Notify Teams — failure
        if: failure()
        run: |
          curl -s -o /dev/null -X POST "${{ secrets.TEAMS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "status":  "failure",
              "app":     "${{ secrets.FUNCTION_APP_NAME }}",
              "branch":  "${{ github.ref_name }}",
              "commit":  "${{ github.sha }}",
              "actor":   "${{ github.actor }}",
              "message": "Virtual Receptionist deployment FAILED - check GitHub Actions logs"
            }' || true
