name: Deploy Virtual Receptionist

on:
  push:
    branches: [ main ]
    paths:
      - 'bot/**'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:

  # ── Job 1: Lint ──────────────────────────────────────────────
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r bot/requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 bot/ \
            --max-line-length=120 \
            --ignore=E501,W503 \
            --exclude=__pycache__,.python_packages

  # ── Job 2: Deploy ─────────────────────────────────────────────
  deploy:
    name: Deploy to Azure Function App
    runs-on: ubuntu-latest
    needs: lint-and-test
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies into package folder
        run: |
          pushd bot
          pip install -r requirements.txt \
            --target=".python_packages/lib/site-packages" \
            --platform manylinux2014_x86_64 \
            --python-version 3.11 \
            --only-binary=:all: \
            --upgrade
          popd

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure app settings
        run: |
          az functionapp config appsettings set \
            --name "${{ secrets.FUNCTION_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --settings \
              "WEBSITE_RUN_FROM_PACKAGE=0" \
              "SCM_DO_BUILD_DURING_DEPLOYMENT=false" \
            --output none

      - name: Deploy bot to Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name:                       ${{ secrets.FUNCTION_APP_NAME }}
          package:                        './bot'
          scm-do-build-during-deployment: false
          enable-oryx-build:              false

      - name: Wait for Function App cold start
        run: sleep 90

      - name: Retrieve function key (with retry)
        run: |
          CREDS=$(az functionapp deployment list-publishing-credentials \
            --name            "${{ secrets.FUNCTION_APP_NAME }}" \
            --resource-group  "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query           "{u:publishingUserName, p:publishingPassword}" \
            --output          json)

          KUDU_USER=$(echo "$CREDS" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['u'])")
          KUDU_PASS=$(echo "$CREDS" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['p'])")

          KUDU_URL="https://${{ secrets.FUNCTION_APP_NAME }}.scm.azurewebsites.net/api/functions/admin/masterkey"

          MAX_ATTEMPTS=10
          ATTEMPT=1
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Key fetch attempt $ATTEMPT of $MAX_ATTEMPTS..."
            RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 20 \
              -u "$KUDU_USER:$KUDU_PASS" \
              "$KUDU_URL")
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -1)
            echo "  HTTP $HTTP_CODE"

            if [ "$HTTP_CODE" = "200" ]; then
              FUNCTION_KEY=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin)['masterKey'])")
              if [ -n "$FUNCTION_KEY" ]; then
                echo "Function key retrieved."
                echo "FUNCTION_KEY=$FUNCTION_KEY" >> "$GITHUB_ENV"
                break
              fi
            fi

            echo "  Not ready yet — waiting 20s..."
            sleep 20
            ATTEMPT=$((ATTEMPT + 1))
          done

          if [ -z "$FUNCTION_KEY" ]; then
            echo "Failed to retrieve function key after $MAX_ATTEMPTS attempts"
            exit 1
          fi

      - name: Health check (with retry)
        run: |
          HEALTH_URL="https://${{ secrets.FUNCTION_APP_NAME }}.azurewebsites.net/api/health?code=${FUNCTION_KEY}"
          echo "Checking: $HEALTH_URL"

          MAX_ATTEMPTS=8
          ATTEMPT=1
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Health check attempt $ATTEMPT of $MAX_ATTEMPTS..."
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$HEALTH_URL")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Health check passed (HTTP 200)"
              exit 0
            fi
            echo "Health check returned HTTP $HTTP_STATUS"
            if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
              echo "Waiting 20s before retry..."
              sleep 20
            fi
            ATTEMPT=$((ATTEMPT + 1))
          done

          echo "Health check failed after $MAX_ATTEMPTS attempts"
          exit 1

      - name: Notify Teams — success
        if: success()
        run: |
          curl -s -o /dev/null -X POST "${{ secrets.TEAMS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "status":  "success",
              "app":     "${{ secrets.FUNCTION_APP_NAME }}",
              "branch":  "${{ github.ref_name }}",
              "commit":  "${{ github.sha }}",
              "actor":   "${{ github.actor }}",
              "message": "Virtual Receptionist deployed successfully"
            }' || true

      - name: Notify Teams — failure
        if: failure()
        run: |
          curl -s -o /dev/null -X POST "${{ secrets.TEAMS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "status":  "failure",
              "app":     "${{ secrets.FUNCTION_APP_NAME }}",
              "branch":  "${{ github.ref_name }}",
              "commit":  "${{ github.sha }}",
              "actor":   "${{ github.actor }}",
              "message": "Virtual Receptionist deployment FAILED - check GitHub Actions logs"
            }' || true
