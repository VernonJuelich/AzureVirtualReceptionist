name: Deploy Virtual Receptionist

on:
  push:
    branches: [ main ]
    paths:
      - 'bot/**'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:

  # ── Job 1: Lint ──────────────────────────────────────────────
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r bot/requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 bot/ \
            --max-line-length=120 \
            --ignore=E501,W503 \
            --exclude=__pycache__,.python_packages

  # ── Job 2: Deploy ─────────────────────────────────────────────
  deploy:
    name: Deploy to Azure Function App
    runs-on: ubuntu-latest
    needs: lint-and-test
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Ensure the Function App is configured for SCM-based deployment.
      # WEBSITE_RUN_FROM_PACKAGE=0 means code is deployed to wwwroot directly
      # (not from a zip package), so Kudu's SCM build pipeline can install
      # dependencies server-side. This avoids cross-platform wheel issues that
      # arise from pre-building on ubuntu-latest and uploading binaries.
      - name: Configure deployment settings
        run: |
          az functionapp config appsettings set \
            --name "${{ secrets.FUNCTION_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --settings \
              "WEBSITE_RUN_FROM_PACKAGE=0" \
              "SCM_DO_BUILD_DURING_DEPLOYMENT=true" \
            --output none

      - name: Deploy bot to Azure Function App
        # scm-do-build-during-deployment=true tells the Kudu SCM pipeline to
        # run `pip install -r requirements.txt` server-side after the upload.
        # enable-oryx-build is intentionally omitted — it conflicts with
        # WEBSITE_RUN_FROM_PACKAGE and causes deployment failures.
        uses: Azure/functions-action@v1
        with:
          app-name:                       ${{ secrets.FUNCTION_APP_NAME }}
          package:                        './bot'
          scm-do-build-during-deployment: true

      - name: Wait for Function App cold start
        # SCM build + Python worker init on Consumption plan can take 90s+
        run: sleep 90

      - name: Retrieve function key (with retry)
        # Uses az functionapp keys list with retry. We already waited 90s for
        # the cold start, so the runtime should be up. If it isn't yet, we
        # retry every 20s up to 10 times (3m20s total additional wait).
        # Avoids Kudu basic-auth which requires Microsoft.Web/sites/config/list
        # RBAC permission that the deploy service principal may not have.
        run: |
          MAX_ATTEMPTS=10
          ATTEMPT=1
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Key fetch attempt $ATTEMPT of $MAX_ATTEMPTS..."

            FUNCTION_KEY=$(az functionapp keys list \
              --name           "${{ secrets.FUNCTION_APP_NAME }}" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --query          "functionKeys.default" \
              --output         tsv 2>/dev/null || true)

            if [ -n "$FUNCTION_KEY" ] && [ "$FUNCTION_KEY" != "null" ]; then
              echo "Function key retrieved."
              echo "FUNCTION_KEY=$FUNCTION_KEY" >> "$GITHUB_ENV"
              break
            fi

            echo "  Runtime not ready yet — waiting 20s..."
            sleep 20
            ATTEMPT=$((ATTEMPT + 1))
          done

          if [ -z "$FUNCTION_KEY" ] || [ "$FUNCTION_KEY" = "null" ]; then
            echo "Failed to retrieve function key after $MAX_ATTEMPTS attempts."
            echo "Check Function App logs: az webapp log tail --name ${{ secrets.FUNCTION_APP_NAME }} --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}"
            exit 1
          fi

      - name: Health check
        run: |
          BASE_URL="https://${{ secrets.FUNCTION_APP_NAME }}.azurewebsites.net"
          HEALTH_URL_API="${BASE_URL}/api/health?code=${FUNCTION_KEY}"
          HEALTH_URL_ROOT="${BASE_URL}/health?code=${FUNCTION_KEY}"
          HEALTH_URL=""

          echo "Checking (preferred): $HEALTH_URL_API"
          echo "Checking (fallback):  $HEALTH_URL_ROOT"

          MAX_ATTEMPTS=8
          ATTEMPT=1
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Health check attempt $ATTEMPT of $MAX_ATTEMPTS..."

            HTTP_STATUS=$(curl -s -o /tmp/health_body -w "%{http_code}" --max-time 30 "$HEALTH_URL_API")
            BODY=$(cat /tmp/health_body)
            HEALTH_URL="$HEALTH_URL_API"

            # Some apps intentionally set routePrefix="" in host.json, which
            # exposes routes at /health (not /api/health). If /api returns 404,
            # probe /health before failing the attempt.
            if [ "$HTTP_STATUS" = "404" ]; then
              ROOT_STATUS=$(curl -s -o /tmp/health_body_root -w "%{http_code}" --max-time 30 "$HEALTH_URL_ROOT")
              ROOT_BODY=$(cat /tmp/health_body_root)
              if [ "$ROOT_STATUS" = "200" ]; then
                HTTP_STATUS="$ROOT_STATUS"
                BODY="$ROOT_BODY"
                HEALTH_URL="$HEALTH_URL_ROOT"
              fi
            fi

            echo "HTTP $HTTP_STATUS from $HEALTH_URL — $BODY"

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Health check passed via $HEALTH_URL"
              exit 0
            fi

            # On 404: runtime is up but routes not registered — likely a Python
            # import failure at startup, or routePrefix mismatch.
            if [ "$HTTP_STATUS" = "404" ]; then
              echo "--- 404 diagnostics ---"
              echo "Route check: /api/health =>"
              curl -s -o /tmp/diag_api_body -w "HTTP %{http_code}\n" --max-time 20 "$HEALTH_URL_API" || true
              echo "Route check: /health =>"
              curl -s -o /tmp/diag_root_body -w "HTTP %{http_code}\n" --max-time 20 "$HEALTH_URL_ROOT" || true

              echo "Registered functions from ARM (if available):"
              az functionapp function list \
                --name "${{ secrets.FUNCTION_APP_NAME }}" \
                --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
                --query "[].name" \
                --output tsv 2>/dev/null || true

              echo "--- 404: fetching recent Function App logs ---"
              az webapp log tail \
                --name           "${{ secrets.FUNCTION_APP_NAME }}" \
                --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
                --timeout        10 2>/dev/null || true
              echo "--- end logs ---"
            fi

            if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
              echo "Waiting 20s before retry..."
              sleep 20
            fi
            ATTEMPT=$((ATTEMPT + 1))
          done

          echo "Health check failed after $MAX_ATTEMPTS attempts"
          exit 1

      - name: Notify Teams — success
        if: success()
        run: |
          curl -s -o /dev/null -X POST "${{ secrets.TEAMS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "status":  "success",
              "app":     "${{ secrets.FUNCTION_APP_NAME }}",
              "branch":  "${{ github.ref_name }}",
              "commit":  "${{ github.sha }}",
              "actor":   "${{ github.actor }}",
              "message": "Virtual Receptionist deployed successfully"
            }' || true

      - name: Notify Teams — failure
        if: failure()
        run: |
          curl -s -o /dev/null -X POST "${{ secrets.TEAMS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "status":  "failure",
              "app":     "${{ secrets.FUNCTION_APP_NAME }}",
              "branch":  "${{ github.ref_name }}",
              "commit":  "${{ github.sha }}",
              "actor":   "${{ github.actor }}",
              "message": "Virtual Receptionist deployment FAILED - check GitHub Actions logs"
            }' || true
