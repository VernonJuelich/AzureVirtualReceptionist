name: Deploy Virtual Receptionist

on:
  push:
    branches: [ main ]
    paths:
      - 'bot/**'
  workflow_dispatch:   # Allow manual trigger from GitHub Actions UI

env:
  PYTHON_VERSION: '3.11'

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r bot/requirements.txt
          pip install flake8 pytest

      - name: Lint with flake8
        run: |
          flake8 bot/ --max-line-length=120 --ignore=E501,W503 --exclude=__pycache__

      - name: Run unit tests (if any)
        run: |
          if [ -d "tests" ]; then pytest tests/ -v; else echo "No tests directory — skipping"; fi

  deploy:
    name: Deploy to Azure Function App
    runs-on: ubuntu-latest
    needs: lint-and-test
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Azure Functions Core Tools
        run: |
          npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Install bot dependencies
        run: |
          pushd bot
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"
          popd

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name:       ${{ secrets.FUNCTION_APP_NAME }}
          package:        './bot'
          scm-do-build-during-deployment: true
          enable-oryx-build: true

      - name: Health check after deploy
        run: |
          echo "Waiting for cold start..."
          sleep 30
          FUNCTION_KEY=$(az functionapp keys list \
            --name ${{ secrets.FUNCTION_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query "functionKeys.default" \
            --output tsv)
          HEALTH_URL="https://${{ secrets.FUNCTION_APP_NAME }}.azurewebsites.net/api/health?code=${FUNCTION_KEY}"
          echo "Health URL: $HEALTH_URL"
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL")
          if [ "$RESPONSE" == "200" ]; then
            echo "✅ Health check passed (HTTP 200)"
          else
            echo "❌ Health check failed (HTTP $RESPONSE)"
            exit 1
          fi

      - name: Notify Teams on success
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
          -d "{
            \"@type\": \"MessageCard\",
            \"@context\": \"https://schema.org/extensions\",
            \"themeColor\": \"00B050\",
            \"summary\": \"Deployment Successful\",
            \"title\": \"✅ Virtual Receptionist Deployed\",
            \"sections\": [{
              \"facts\": [
                {\"name\": \"Function App\", \"value\": \"${{ secrets.FUNCTION_APP_NAME }}\"},
                {\"name\": \"Branch\", \"value\": \"${{ github.ref_name }}\"},
                {\"name\": \"Commit\", \"value\": \"${{ github.sha }}\"},
                {\"name\": \"Triggered by\", \"value\": \"${{ github.actor }}\"}
              ]
            }]
          }" \
          "${{ secrets.TEAMS_WEBHOOK_URL }}" || true

      - name: Notify Teams on failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -d "{
            \"@type\": \"MessageCard\",
            \"@context\": \"https://schema.org/extensions\",
            \"themeColor\": \"FF0000\",
            \"summary\": \"Deployment Failed\",
            \"title\": \"❌ Virtual Receptionist Deployment FAILED\",
            \"sections\": [{
              \"facts\": [
                {\"name\": \"Function App\", \"value\": \"${{ secrets.FUNCTION_APP_NAME }}\"},
                {\"name\": \"Branch\", \"value\": \"${{ github.ref_name }}\"},
                {\"name\": \"Commit\", \"value\": \"${{ github.sha }}\"},
                {\"name\": \"Triggered by\", \"value\": \"${{ github.actor }}\"},
                {\"name\": \"Action\", \"value\": \"Check GitHub Actions logs\"}
              ]
            }]
          }" \
          "${{ secrets.TEAMS_WEBHOOK_URL }}" || true
